<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: #0f0f1a;
      color: #eee;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 550px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      color: #4fc3f7;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .stat {
      text-align: center;
      background: #16213e;
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 14px;
      color: #aaa;
    }

    .stat span {
      display: block;
      font-size: 22px;
      font-weight: bold;
      color: #4fc3f7;
    }

    .stat.completadas span {
      color: #66bb6a;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      padding: 14px;
      border: 2px solid #16213e;
      border-radius: 10px;
      background: #16213e;
      color: #eee;
      font-size: 16px;
      transition: border 0.2s;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #4fc3f7;
    }

    .btn-agregar {
      padding: 14px 22px;
      background: #4fc3f7;
      color: #0f0f1a;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-agregar:hover {
      background: #81d4fa;
      transform: scale(1.04);
    }

    .filtros {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .filtro {
      padding: 7px 18px;
      border-radius: 20px;
      border: 2px solid #16213e;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .filtro.activo {
      background: #4fc3f7;
      color: #0f0f1a;
      border-color: #4fc3f7;
      font-weight: bold;
    }

    .lista {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tarea {
      background: #16213e;
      padding: 16px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideIn 0.25s ease;
      border-left: 4px solid #4fc3f7;
      transition: opacity 0.3s, transform 0.3s;
    }

    .tarea.completada {
      border-left-color: #66bb6a;
      opacity: 0.7;
    }

    .tarea.completada .titulo {
      text-decoration: line-through;
      color: #888;
    }

    .tarea.removiendo {
      opacity: 0;
      transform: translateX(40px);
    }

    .titulo {
      font-size: 16px;
      flex: 1;
    }

    .fecha {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }

    .info {
      flex: 1;
    }

    .botones {
      display: flex;
      gap: 8px;
      margin-left: 12px;
    }

    .btn-completar {
      padding: 8px 12px;
      background: #66bb6a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.1s;
    }

    .btn-completar:hover {
      transform: scale(1.1);
    }

    .btn-eliminar {
      padding: 8px 12px;
      background: #ef5350;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.1s;
    }

    .btn-eliminar:hover {
      transform: scale(1.1);
    }

    .vacio {
      text-align: center;
      color: #555;
      padding: 40px 0;
      font-size: 15px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Mi Todo App</h1>

    <div class="stats">
      <div class="stat">
        <span id="countPendientes">0</span>
        Pendientes
      </div>
      <div class="stat completadas">
        <span id="countCompletadas">0</span>
        Completadas
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="inputTarea" placeholder="Escribe una tarea..." />
      <button class="btn-agregar" onclick="crearTarea()">Agregar</button>
    </div>

    <div class="filtros">
      <button class="filtro activo" onclick="setFiltro('todas', this)">Todas</button>
      <button class="filtro" onclick="setFiltro('pendientes', this)">Pendientes</button>
      <button class="filtro" onclick="setFiltro('completadas', this)">Completadas</button>
    </div>

    <div class="lista" id="listaTareas"></div>
  </div>

  <script>
    let filtroActual = 'todas'
    let todasLasTareas = []

    function formatearFecha(fecha) {
      const d = new Date(fecha)
      return d.toLocaleDateString('es-PR', {
        day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
      })
    }

    function setFiltro(filtro, btn) {
      filtroActual = filtro
      document.querySelectorAll('.filtro').forEach(b => b.classList.remove('activo'))
      btn.classList.add('activo')
      renderTareas()
    }

    function renderTareas() {
      const lista = document.getElementById('listaTareas')
      lista.innerHTML = ''

      let tareasFiltradas = todasLasTareas
      if (filtroActual === 'pendientes') tareasFiltradas = todasLasTareas.filter(t => !t.completada)
      if (filtroActual === 'completadas') tareasFiltradas = todasLasTareas.filter(t => t.completada)

      const pendientes = todasLasTareas.filter(t => !t.completada).length
      const completadas = todasLasTareas.filter(t => t.completada).length
      document.getElementById('countPendientes').textContent = pendientes
      document.getElementById('countCompletadas').textContent = completadas

      if (tareasFiltradas.length === 0) {
        lista.innerHTML = '<p class="vacio">No hay tareas aquí 👌</p>'
        return
      }

      tareasFiltradas.forEach(tarea => {
        const div = document.createElement('div')
        div.className = 'tarea' + (tarea.completada ? ' completada' : '')
        div.id = 'tarea-' + tarea.id
        div.innerHTML = `
          <div class="info">
            <div class="titulo">${tarea.titulo}</div>
            <div class="fecha">${tarea.fecha ? formatearFecha(tarea.fecha) : 'Ahora'}</div>
          </div>
          <div class="botones">
            ${!tarea.completada
              ? `<button class="btn-completar" onclick="completar(${tarea.id})">✓</button>`
              : ''}
            <button class="btn-eliminar" onclick="eliminar(${tarea.id})">✕</button>
          </div>
        `
        lista.appendChild(div)
      })
    }

    async function cargarTareas() {
      const res = await fetch('/tareas')
      todasLasTareas = await res.json()
      renderTareas()
    }

    async function crearTarea() {
      const input = document.getElementById('inputTarea')
      const titulo = input.value.trim()
      if (!titulo) return

      await fetch('/tareas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ titulo, fecha: new Date() })
      })

      input.value = ''
      cargarTareas()
    }

    async function completar(id) {
      await fetch(`/tareas/${id}`, { method: 'PUT' })
      cargarTareas()
    }

    async function eliminar(id) {
      const el = document.getElementById('tarea-' + id)
      el.classList.add('removiendo')
      setTimeout(async () => {
        await fetch(`/tareas/${id}`, { method: 'DELETE' })
        cargarTareas()
      }, 300)
    }

    document.getElementById('inputTarea').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') crearTarea()
    })

    cargarTareas()
  </script>
</body>
</html>
